name: Generate Lockfile

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate lockfile
        run: npm install

      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: lockfile
          path: package-lock.json
