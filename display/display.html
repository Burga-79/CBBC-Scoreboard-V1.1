<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Comet Bay Bowling Club – Scoreboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="display-body style-sport">
    <div class="background-layer">
      <div id="backgroundImage" class="background-image"></div>
      <div id="backgroundOverlay" class="background-overlay"></div>
    </div>

    <header class="header">
      <div class="header-left">
        <div class="club-name">Comet Bay Bowling Club</div>
        <div class="header-subtitle">Live Ladder & Results</div>
      </div>
      <div class="club-logo">
        <img id="clubLogo" src="" alt="Club Logo" />
      </div>
    </header>

    <main class="main">
      <section class="ladder-section">
        <h2>Ladder</h2>
        <table id="ladderTable">
          <thead>
            <tr>
              <th>Pos</th>
              <th>Team / Skipper</th>
              <th>GP</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>SF</th>
              <th>SA</th>
              <th>SD</th>
              <th>%</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="results-section">
        <h2>Recent Results</h2>
        <div id="resultsList"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="sponsors-label">Proudly supported by</div>
      <div class="sponsors-carousel" id="sponsorsBar"></div>
    </footer>

    <script src="script-display.js"></script>
  </body>
</html>
